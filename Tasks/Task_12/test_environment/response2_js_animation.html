<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Response 2 - JavaScript requestAnimationFrame</title>
</head>
<body>
    <h1>Response 2 - JavaScript requestAnimationFrame</h1>

    <svg width="400" height="120" xmlns="http://www.w3.org/2000/svg">
        <text id="myText" x="20" y="60" font-size="32">JS Animation</text>
    </svg>

    <script>
        const text = document.getElementById('myText');
        let start = null;

        function animate(ts) {
          if (!start) start = ts;
          const progress = (ts - start) / 2000;          // 2‑second cycle
          const hue = Math.floor((progress % 1) * 360);
          text.style.fill = `hsl(${hue}, 80%, 50%)`;
          requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
