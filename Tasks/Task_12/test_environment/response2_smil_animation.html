<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Response 2 - SMIL Animation</title>
</head>
<body>
    <h1>Response 2 - SMIL Animation</h1>

    <svg width="400" height="120" xmlns="http://www.w3.org/2000/svg">
        <text id="myText" x="20" y="90" font-size="32">SMIL Demo</text>
        <animate attributeName="fill"
                 from="#ff00ff"
                 to="#00ffff"
                 dur="3s"
                 repeatCount="indefinite"/>
    </svg>
</body>
</html>
