<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Response 2 - CSS Class-based Styling</title>
    <style>
        /* In the <style> block or an external stylesheet */
        .big-red {
          fill: crimson;        /* changes the inside colour */
          stroke: #333;         /* optional outline */
          stroke-width: 0.5;
        }
    </style>
</head>
<body>
    <h1>Response 2 - CSS Class-based Styling</h1>

    <svg width="300" height="100" xmlns="http://www.w3.org/2000/svg">
        <text id="myText" class="big-red" x="20" y="60">Hello SVG!</text>
    </svg>
</body>
</html>
