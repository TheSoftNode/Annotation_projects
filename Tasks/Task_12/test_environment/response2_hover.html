<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Response 2 - Hover Without JS</title>
    <style>
        svg text { fill: #555; transition: fill 0.2s ease; }
        svg text:hover { fill: orange; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Response 2 - Hover Without JS</h1>
    <p>Hover over the text to see it change color</p>

    <svg width="300" height="100" xmlns="http://www.w3.org/2000/svg">
        <text x="20" y="60" font-size="24">Hover me!</text>
    </svg>
</body>
</html>
